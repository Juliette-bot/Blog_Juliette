<div class="section-label">— derniers articles</div>

{% for post in collections.posts | reverse %}
<div class="post-card">
  <h2><a href="{{ post.url }}">{{ post.data.title }}</a></h2>
  <div class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</div>
  <p>{{ post.data.description }}</p>
</div>
{% endfor %}
